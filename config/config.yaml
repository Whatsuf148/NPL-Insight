# Central configuration — single source of truth, no hardcoded values in code.

seasons:
  - id: 1
    year: 2024
    name: "NPL Season 1"
    dates: "30 Nov - 21 Dec 2024"
    wikipedia_url: "https://en.wikipedia.org/wiki/2024_Nepal_Premier_League"
  - id: 2
    year: 2025
    name: "NPL Season 2"
    dates: "17 Nov - 13 Dec 2025"
    wikipedia_url: "https://en.wikipedia.org/wiki/2025_Nepal_Premier_League"

# Real NPL franchises (verified via Wikipedia — see seasons[].wikipedia_url).
teams:
  - Biratnagar Kings
  - Chitwan Rhinos
  - Janakpur Bolts
  - Karnali Yaks
  - Kathmandu Gorkhas
  - Lumbini Lions
  - Pokhara Avengers
  - Sudurpaschim Royals

venues:
  - Tribhuvan University International Cricket Ground

phases:
  - powerplay
  - middle
  - death

overs_per_innings: 20
powerplay_overs: 6
death_overs_start: 16

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  master_dataset: "data/processed/master_dataset.csv"
  db_path: "data/processed/npl_insight.db"
  model_dir: "models"

storage:
  backend: "sqlite"   # "csv" or "sqlite"

data_sources:
  enabled:
    - cricsheet      # real ball-by-ball data for every match — primary, most-accurate source
  # Cricsheet (https://cricsheet.org) — real ball-by-ball JSON for all 64 NPL matches across
  # both seasons. Verified working from this environment (HTTP 200, downloaded and parsed).
  # Every batting/bowling number in the master dataset is a real delivery when this is enabled.
  # Does NOT include dropped catches/missed stumpings/misfields — no public source records
  # fielding mistakes for NPL, so those three columns are always a real "no data" 0, not an
  # estimate. See src/data_sources/cricsheet.py for the full real/simulated breakdown.
  cricsheet:
    enabled: true
  # Real-data enrichment (squads, leaderboards, awards, the one full real scorecard per
  # season available on Wikipedia) — verified working from this environment. Player names
  # use full names ("Sandeep Lamichhane"), while cricsheet uses cricket-scorecard abbreviated
  # names ("S Lamichhane") — the two sources aren't name-joined; Fun Facts (Wikipedia) and
  # Player Stats Explorer (cricsheet) may reference the same person under different spellings.
  wikipedia:
    enabled: true
  # Statistical fallback — only used if cricsheet is disabled/unreachable. Real player names
  # (drawn from Wikipedia squads) but simulated per-match performances; kept for offline/
  # degraded-network use, not the primary source. See "Player Participation Realism" in README.
  simulator:
    enabled: false
  # Pluggable scrapers — disabled by default. Verified from this environment:
  # espncricinfo.com returns HTTP 403 to direct requests (bot-blocked), and cricbuzz.com
  # is blocked at the agent/crawler level for automated fetches. The fetch() methods below
  # are real, working HTTP+parsing implementations (requests + BeautifulSoup) and are not
  # stubs — they simply can't reach their target from this sandboxed network. Flip
  # `enabled: true` from an unblocked network (e.g. your own machine, or with a paid
  # API/proxy) and they will populate real data with no other code changes.
  espncricinfo:
    enabled: false
    base_url: "https://www.espncricinfo.com"
    series_path: "/series/nepal-premier-league-2024-25-1462594/match-schedule-fixtures-and-results"
  cricbuzz:
    enabled: false
    base_url: "https://www.cricbuzz.com"

simulator:
  random_seed: 42
  matches_per_season: 15
  players_per_team: 14
  use_real_rosters: true   # draw player names from wikipedia squads instead of "Team Player N"

feature_engineering:
  consistency_window: 5          # matches used for rolling consistency index
  pressure_chase_margin: 15       # runs target margin considered "pressure" chase
  clutch_min_balls: 12
  pressure_min_balls: 12           # minimum balls faced in "lost matches" before pressure score qualifies
  min_balls_for_rate_insights: 10   # minimum balls faced before a strike rate can headline an insight
  min_overs_for_economy_insights: 2 # minimum overs bowled before an economy can headline an insight

analytics:
  win_probability_model: "models/win_probability_model.pkl"
  player_ranking_top_n: 10
