# Central configuration — single source of truth, no hardcoded values in code.

seasons:
  - id: 1
    year: 2024
    name: "NPL Season 1"
  - id: 2
    year: 2025
    name: "NPL Season 2"

teams:
  - Kathmandu Gorkhas
  - Pokhara Avengers
  - Janakpur Royals
  - Biratnagar Kings
  - Chitwan Rhinos
  - Sudurpaschim Royals

venues:
  - Tribhuvan University International Cricket Ground
  - Pokhara Rangasala
  - Mulpani Cricket Ground

phases:
  - powerplay
  - middle
  - death

overs_per_innings: 20
powerplay_overs: 6
death_overs_start: 16

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  master_dataset: "data/processed/master_dataset.csv"
  db_path: "data/processed/npl_insight.db"
  model_dir: "models"

storage:
  backend: "sqlite"   # "csv" or "sqlite"

data_sources:
  enabled:
    - simulator      # generates realistic sample data end-to-end
  # Pluggable scrapers (disabled by default — wire up with real endpoints/credentials later)
  espncricinfo:
    enabled: false
    base_url: "https://www.espncricinfo.com"
  cricbuzz:
    enabled: false
    base_url: "https://www.cricbuzz.com"

simulator:
  random_seed: 42
  matches_per_season: 15
  players_per_team: 14

feature_engineering:
  consistency_window: 5          # matches used for rolling consistency index
  pressure_chase_margin: 15       # runs target margin considered "pressure" chase
  clutch_min_balls: 12

analytics:
  win_probability_model: "models/win_probability_model.pkl"
  player_ranking_top_n: 10
